<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Spider 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-card:#16161f;
--bg-hover:#1c1c28;--bg-input:#0e0e16;--border:#262630;
--text-primary:#e8e8ed;--text-secondary:#8888a0;--text-muted:#55556a;
--accent:#6c5ce7;--accent-light:#7c6ff7;
--green:#00d68f;--red:#ff4757;--yellow:#ffa502;--blue:#3498ff;
}
.hidden{display:none!important}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
a{color:var(--accent-light);text-decoration:none}

/* Toast */
#toast{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;border-radius:8px;font-size:14px;color:#fff;animation:slideIn .3s;min-width:250px}
.toast-item.success{background:var(--green)}.toast-item.error{background:var(--red)}.toast-item.info{background:var(--blue)}.toast-item.warn{background:var(--yellow);color:#000}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Login */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary)}
.login-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:48px;width:400px;max-width:90vw}
.login-box h1{text-align:center;margin-bottom:8px;font-size:24px}
.login-box p{text-align:center;color:var(--text-secondary);margin-bottom:32px;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--text-secondary)}
.form-group input{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;outline:none}
.form-group input:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-primary:hover{background:var(--accent-light)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
.btn-warn{background:var(--yellow);color:#000}.btn-warn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--bg-secondary);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px;font-size:16px;font-weight:700;color:var(--accent-light);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-logo svg{width:22px;height:22px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-secondary);cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{color:var(--accent-light);background:var(--bg-hover);border-left-color:var(--accent)}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)}
.sidebar-footer .logout-btn{color:var(--red);cursor:pointer;font-size:13px}
.sidebar-footer .logout-btn:hover{text-decoration:underline}

#main{margin-left:220px;flex:1;padding:28px 32px;min-height:100vh}
.page{display:none}.page.active{display:block}
.page-title{font-size:22px;font-weight:600;margin-bottom:24px}

/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:13px;color:var(--text-secondary);margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700}.stat-card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}

/* Table */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg-secondary)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,214,143,.15);color:var(--green)}
.badge-red{background:rgba(255,71,87,.15);color:var(--red)}
.badge-yellow{background:rgba(255,165,2,.15);color:var(--yellow)}
.badge-blue{background:rgba(52,152,255,.15);color:var(--blue)}
.badge-purple{background:rgba(108,92,231,.15);color:var(--accent-light)}
.badge-gray{background:rgba(136,136,160,.15);color:var(--text-muted)}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar select,.toolbar input[type=text]{padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}

/* Worker cards */
.worker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.worker-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.worker-card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.worker-meta{font-size:13px;color:var(--text-secondary);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--bg-input);border-radius:3px;margin-top:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}

/* Log */
#log-container{background:#000;border:1px solid var(--border);border-radius:12px;padding:16px;font-family:'Fira Code','Cascadia Code',monospace;font-size:12px;line-height:1.7;max-height:calc(100vh - 220px);overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.log-INFO{color:var(--blue)}.log-WARN{color:var(--yellow)}.log-ERROR{color:var(--red)}.log-DEBUG{color:var(--text-muted)}

/* Settings */
.settings-form{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:600px}
.settings-form .form-group{margin-bottom:20px}

/* Info card */
.info-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.info-card h3{font-size:15px;margin-bottom:12px;color:var(--text-primary)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--text-muted)}.info-row .v{color:var(--text-secondary)}

.actions{display:flex;gap:6px}
.checkbox-col{width:40px}
input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Login Page -->
<div id="login-page">
  <div class="login-box">
    <h1>🕷️ AI Spider</h1>
    <p>管理后台登录</p>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-logo">🕷️ AI Spider 管理后台</div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">📊 仪表盘</div>
      <div class="nav-item" data-page="users" onclick="switchPage('users')">👥 用户管理</div>
      <div class="nav-item" data-page="tasks" onclick="switchPage('tasks')">📋 任务管理</div>
      <div class="nav-item" data-page="workers" onclick="switchPage('workers')">🖥️ Worker节点</div>
      <div class="nav-item" data-page="logs" onclick="switchPage('logs')">📜 系统日志</div>
      <div class="nav-item" data-page="settings" onclick="switchPage('settings')">⚙️ 系统设置</div>
    </div>
    <div class="sidebar-footer">
      <div id="admin-email" style="margin-bottom:8px"></div>
      <span class="logout-btn" onclick="doLogout()">退出登录</span>
    </div>
  </div>

  <div id="main">
    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <div class="page-title">仪表盘</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="label">👥 用户数</div><div class="value" id="s-users">-</div></div>
        <div class="stat-card"><div class="label">📁 项目数</div><div class="value" id="s-projects">-</div></div>
        <div class="stat-card"><div class="label">📋 任务数</div><div class="value" id="s-tasks">-</div><div class="sub" id="s-tasks-sub"></div></div>
        <div class="stat-card"><div class="label">🖥️ Worker节点</div><div class="value" id="s-workers">-</div><div class="sub" id="s-workers-sub"></div></div>
      </div>
      <div class="page-title" style="font-size:16px;margin-bottom:16px">最近任务</div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>项目</th><th>状态</th><th>类型</th><th>创建时间</th></tr></thead>
        <tbody id="recent-tasks"></tbody></table>
      </div>
      <div class="info-card" id="sys-info-card">
        <h3>系统信息</h3>
        <div id="sys-info-body"></div>
      </div>
    </div>

    <!-- Users -->
    <div class="page" id="page-users">
      <div class="page-title">用户管理</div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>邮箱</th><th>用户名</th><th>角色</th><th>配额</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="users-tbody"></tbody></table>
      </div>
    </div>

    <!-- Tasks -->
    <div class="page" id="page-tasks">
      <div class="page-title">任务管理</div>
      <div class="toolbar">
        <select id="task-status-filter" onchange="loadTasks()">
          <option value="">全部状态</option>
          <option value="pending">待处理</option>
          <option value="running">运行中</option>
          <option value="completed">已完成</option>
          <option value="failed">失败</option>
          <option value="cancelled">已取消</option>
        </select>
        <button class="btn btn-sm btn-outline" onclick="batchTaskAction('cancel')">批量取消</button>
        <button class="btn btn-sm btn-danger" onclick="batchTaskAction('delete')">批量删除</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th class="checkbox-col"><input type="checkbox" id="task-select-all" onchange="toggleAllTasks(this)"></th><th>ID</th><th>用户</th><th>项目</th><th>状态</th><th>类型</th><th>优先级</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="tasks-tbody"></tbody></table>
      </div>
    </div>

    <!-- Workers -->
    <div class="page" id="page-workers">
      <div class="page-title">Worker节点</div>
      <div class="worker-grid" id="workers-grid"></div>
    </div>

    <!-- Logs -->
    <div class="page" id="page-logs">
      <div class="page-title">系统日志</div>
      <div class="toolbar">
        <select id="log-level-filter" onchange="filterLogs()">
          <option value="">全部</option><option value="INFO">INFO</option><option value="WARN">WARN</option><option value="ERROR">ERROR</option>
        </select>
        <button class="btn btn-sm btn-outline" onclick="loadLogs()">🔄 刷新</button>
      </div>
      <div id="log-container"></div>
    </div>

    <!-- Settings -->
    <div class="page" id="page-settings">
      <div class="page-title">系统设置</div>
      <div class="settings-form">
        <div class="form-group"><label>LLM 模型</label><input type="text" id="set-model" placeholder="gpt-4"></div>
        <div class="form-group"><label>Redis URL</label><input type="text" id="set-redis" placeholder="redis://localhost:6379"></div>
        <div class="form-group"><label>User-Agent</label><input type="text" id="set-ua" placeholder="AI-Spider/1.0"></div>
        <div class="form-group"><label>最大并发</label><input type="text" id="set-concurrency" placeholder="10"></div>
        <button class="btn btn-primary" style="width:auto" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = location.pathname.replace(/\/admin\/?$/, '').replace(/\/$/, '');
let API_KEY = localStorage.getItem('admin_api_key') || '';
let allLogs = [];

// --- Util ---
function toast(msg, type='info') {
  const d = document.createElement('div');
  d.className = 'toast-item ' + type;
  d.textContent = msg;
  document.getElementById('toast').appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json'};
  if (API_KEY) headers['X-API-Key'] = API_KEY;
  try {
    const r = await fetch(API_BASE + path, {...opts, headers: {...headers, ...(opts.headers||{})}});
    if (r.status === 401) { doLogout(); throw new Error('未授权'); }
    if (r.status === 404) return null;
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    return await r.json();
  } catch(e) { if(e.message!=='未授权') throw e; return null; }
}

function fmtTime(t) {
  if (!t) return '-';
  return new Date(t).toLocaleString('zh-CN');
}

function statusBadge(s) {
  const m = {pending:'badge-yellow',running:'badge-blue',completed:'badge-green',failed:'badge-red',cancelled:'badge-gray',success:'badge-green'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s||'-'}</span>`;
}

function roleBadge(r) {
  return r === 'admin' ? '<span class="badge badge-purple">admin</span>' : '<span class="badge badge-gray">'+(r||'user')+'</span>';
}

// --- Auth ---
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  if (!email || !pw) return toast('请填写邮箱和密码','warn');
  try {
    const r = await api('/api/v1/auth/login', {method:'POST', body: JSON.stringify({email, password: pw})});
    if (!r || !r.api_key) return toast('登录失败','error');
    API_KEY = r.api_key;
    localStorage.setItem('admin_api_key', API_KEY);
    await checkAuth();
  } catch(e) { toast('登录失败: '+e.message,'error'); }
}

async function checkAuth() {
  try {
    const me = await api('/api/v1/auth/me');
    if (!me) { showLogin(); return; }
    if (me.role !== 'admin') { toast('无管理员权限','error'); doLogout(); return; }
    document.getElementById('admin-email').textContent = me.email || me.username || 'Admin';
    showApp();
    loadDashboard();
  } catch(e) { showLogin(); }
}

function showLogin() { document.getElementById('login-page').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
function showApp() { document.getElementById('login-page').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); connectAdminWS(); }
function doLogout() { API_KEY=''; localStorage.removeItem('admin_api_key'); showLogin(); if(_adminWs) { try{_adminWs.close();}catch(e){} } }

// WebSocket for admin
let _adminWs = null;
function connectAdminWS() {
  if (_adminWs) { try { _adminWs.close(); } catch(e){} }
  if (!API_KEY) return;
  const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsPath = API_BASE + '/ws/' + API_KEY;
  const wsUrl = wsProtocol + '//' + location.host + wsPath;
  _adminWs = new WebSocket(wsUrl);
  _adminWs.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'task_update') {
        toast('任务 ' + (msg.task_id||'').slice(0,8) + ' ' + (msg.status === 'success' ? '完成' : '失败'), msg.status === 'success' ? 'success' : 'error');
        loadDashboard();
      } else if (msg.type === 'project_created') {
        loadDashboard();
      }
    } catch(err) {}
  };
  _adminWs.onclose = () => { setTimeout(connectAdminWS, 5000); };
  setInterval(() => { if (_adminWs && _adminWs.readyState === WebSocket.OPEN) _adminWs.send(JSON.stringify({type:'ping'})); }, 30000);
}

// --- Navigation ---
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelector(`.nav-item[data-page="${name}"]`).classList.add('active');
  const loaders = {dashboard:loadDashboard, users:loadUsers, tasks:loadTasks, workers:loadWorkers, logs:loadLogs};
  if (loaders[name]) loaders[name]();
}

// --- Dashboard ---
async function loadDashboard() {
  // Use admin stats endpoint
  try {
    const stats = await api('/api/v1/admin/stats');
    if (stats) {
      document.getElementById('s-users').textContent = stats.users ?? '-';
      document.getElementById('s-projects').textContent = stats.projects ?? '-';
      document.getElementById('s-tasks').textContent = stats.tasks ?? '-';
      document.getElementById('s-tasks-sub').textContent = stats.tasks_running ? stats.tasks_running+' 运行中' : '';
      document.getElementById('s-workers').textContent = stats.workers ?? '-';
      document.getElementById('s-workers-sub').textContent = stats.workers_online ? stats.workers_online+' 在线' : '';
    }
  } catch(e) {}

  // Recent tasks
  try {
    const d = await api('/api/v1/tasks');
    if (d) {
      const list = Array.isArray(d) ? d : (d.tasks||d.items||[]);
      const recent = list.slice(0,8);
      document.getElementById('recent-tasks').innerHTML = recent.length ? recent.map(t =>
        `<tr><td>${(t.id||t.task_id||'').toString().slice(0,8)}</td><td>${t.project_name||t.project_id||'-'}</td><td>${statusBadge(t.status)}</td><td>${t.type||t.task_type||'-'}</td><td>${fmtTime(t.created_at)}</td></tr>`
      ).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">暂无任务</td></tr>';
    }
  } catch(e) {}

  // System info
  try {
    const d = await api('/api/v1/system/info');
    if (d) {
      const entries = Object.entries(d).filter(([k])=>!k.startsWith('_'));
      document.getElementById('sys-info-body').innerHTML = entries.map(([k,v])=>
        `<div class="info-row"><span class="k">${k}</span><span class="v">${typeof v==='object'?JSON.stringify(v):v}</span></div>`
      ).join('');
    } else { document.getElementById('sys-info-body').innerHTML = '<div class="info-row"><span class="k">状态</span><span class="v">无法获取</span></div>'; }
  } catch(e) { document.getElementById('sys-info-body').innerHTML = '<div class="info-row"><span class="k">状态</span><span class="v">无法获取</span></div>'; }
}

// --- Users ---
async function loadUsers() {
  const tbody = document.getElementById('users-tbody');
  try {
    const d = await api('/api/v1/admin/users');
    if (!d) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">接口不可用</td></tr>'; return; }
    const list = Array.isArray(d) ? d : (d.users||d.items||[]);
    tbody.innerHTML = list.length ? list.map(u => `<tr>
      <td>${(u.id||'').toString().slice(0,8)}</td>
      <td>${u.email||'-'}</td><td>${u.username||'-'}</td>
      <td>${roleBadge(u.role)}</td>
      <td>${u.quota_projects||'-'}/${u.quota_tasks||'-'}</td>
      <td>${u.status==='suspended'?'<span class="badge badge-red">已封禁</span>':'<span class="badge badge-green">正常</span>'}</td>
      <td>${fmtTime(u.created_at)}</td>
      <td class="actions">
        <button class="btn btn-sm ${u.status==='suspended'?'btn-success':'btn-warn'}" onclick="toggleBan('${u.id}','${u.status}')">${u.status==='suspended'?'解封':'封禁'}</button>
        <button class="btn btn-sm btn-outline" onclick="changeRole('${u.id}')">改角色</button>
        <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">删除</button>
      </td></tr>`).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">暂无用户</td></tr>';
  } catch(e) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">加载失败</td></tr>'; }
}

async function toggleBan(id, currentStatus) {
  const newStatus = currentStatus === 'suspended' ? 'active' : 'suspended';
  try { const r = await api(`/api/v1/admin/users/${id}/status`, {method:'PUT', body:JSON.stringify({status: newStatus})}); if(r===null) toast('接口暂不可用(404)','warn'); else { toast('操作成功','success'); loadUsers(); } } catch(e) { toast('操作失败','error'); }
}
async function changeRole(id) {
  const role = prompt('输入新角色 (admin/user):');
  if (!role) return;
  try { const r = await api(`/api/v1/admin/users/${id}/role`, {method:'PUT', body:JSON.stringify({role})}); if(r===null) toast('接口暂不可用(404)','warn'); else { toast('角色已更新','success'); loadUsers(); } } catch(e) { toast('操作失败','error'); }
}
async function deleteUser(id) {
  if (!confirm('确认删除该用户?')) return;
  try { const r = await api(`/api/v1/admin/users/${id}`, {method:'DELETE'}); if(r===null) toast('接口暂不可用(404)','warn'); else { toast('已删除','success'); loadUsers(); } } catch(e) { toast('操作失败','error'); }
}

// --- Tasks ---
async function loadTasks() {
  const tbody = document.getElementById('tasks-tbody');
  const status = document.getElementById('task-status-filter').value;
  try {
    let url = '/api/v1/tasks';
    if (status) url += '?status=' + status;
    const d = await api(url);
    if (!d) { tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text-muted)">无数据</td></tr>'; return; }
    const list = Array.isArray(d) ? d : (d.tasks||d.items||[]);
    document.getElementById('task-select-all').checked = false;
    tbody.innerHTML = list.length ? list.map(t => `<tr>
      <td class="checkbox-col"><input type="checkbox" class="task-cb" value="${t.id||t.task_id}"></td>
      <td>${(t.id||t.task_id||'').toString().slice(0,8)}</td>
      <td>${t.user_id||t.username||'-'}</td>
      <td>${t.project_name||t.project_id||'-'}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.type||t.task_type||'-'}</td>
      <td>${t.priority||'-'}</td>
      <td>${fmtTime(t.created_at)}</td>
      <td class="actions">
        <button class="btn btn-sm btn-warn" onclick="taskAction('${t.id||t.task_id}','cancel')">取消</button>
        <button class="btn btn-sm btn-outline" onclick="taskAction('${t.id||t.task_id}','retry')">重试</button>
        <button class="btn btn-sm btn-danger" onclick="taskAction('${t.id||t.task_id}','delete')">删除</button>
      </td></tr>`).join('') : '<tr><td colspan="9" style="text-align:center;color:var(--text-muted)">暂无任务</td></tr>';
  } catch(e) { tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text-muted)">加载失败</td></tr>'; }
}

function toggleAllTasks(el) {
  document.querySelectorAll('.task-cb').forEach(cb => cb.checked = el.checked);
}

function getSelectedTaskIds() {
  return [...document.querySelectorAll('.task-cb:checked')].map(cb => cb.value);
}

async function taskAction(id, action) {
  try {
    let r;
    if (action === 'delete') { if(!confirm('确认删除?'))return; r = await api(`/api/v1/tasks/${id}`,{method:'DELETE'}); }
    else if (action === 'cancel') { r = await api(`/api/v1/tasks/${id}/cancel`,{method:'POST'}); }
    else if (action === 'retry') { r = await api(`/api/v1/tasks/${id}/retry`,{method:'POST'}); }
    if(r===null) toast('接口暂不可用(404)','warn'); else { toast('操作成功','success'); loadTasks(); }
  } catch(e) { toast('操作失败','error'); }
}

async function batchTaskAction(action) {
  const ids = getSelectedTaskIds();
  if (!ids.length) return toast('请先选择任务','warn');
  if (action==='delete' && !confirm(`确认删除 ${ids.length} 个任务?`)) return;
  for (const id of ids) await taskAction(id, action);
}

// --- Workers ---
async function loadWorkers() {
  const grid = document.getElementById('workers-grid');
  try {
    const d = await api('/api/v1/workers');
    if (!d) { grid.innerHTML='<div style="color:var(--text-muted)">无数据</div>'; return; }
    const list = Array.isArray(d) ? d : (d.workers||d.items||[]);
    grid.innerHTML = list.length ? list.map(w => {
      const online = w.status==='online'||w.is_online;
      const cpu = w.cpu_usage||w.cpu_percent||0;
      const mem = w.memory_usage||w.memory_percent||w.mem_usage||0;
      return `<div class="worker-card">
        <h3>${w.hostname||w.name||'Worker'} ${online?'<span class="badge badge-green">在线</span>':'<span class="badge badge-red">离线</span>'}</h3>
        <div class="worker-meta"><span>IP: ${w.ip||w.ip_address||'-'}</span><span>并发: ${w.concurrency||w.max_concurrency||'-'}</span></div>
        <div class="worker-meta"><span>CPU</span><span>${cpu}%</span></div>
        <div class="progress-bar"><div class="fill" style="width:${cpu}%"></div></div>
        <div class="worker-meta" style="margin-top:8px"><span>内存</span><span>${typeof mem==='number'?mem+'%':mem}</span></div>
        <div class="worker-meta" style="margin-top:8px"><span>✅ ${w.tasks_completed||w.completed||0} 完成</span><span>❌ ${w.tasks_failed||w.failed||0} 失败</span></div>
        <button class="btn btn-sm btn-danger" style="margin-top:12px" onclick="removeWorker('${w.id||w.worker_id}')">移除</button>
      </div>`;
    }).join('') : '<div style="color:var(--text-muted)">暂无Worker节点</div>';
  } catch(e) { grid.innerHTML='<div style="color:var(--text-muted)">加载失败</div>'; }
}

async function removeWorker(id) {
  if (!confirm('确认移除该Worker?')) return;
  try { const r = await api(`/api/v1/workers/${id}`,{method:'DELETE'}); if(r===null) toast('接口暂不可用(404)','warn'); else { toast('已移除','success'); loadWorkers(); } } catch(e) { toast('操作失败','error'); }
}

// --- Logs ---
async function loadLogs() {
  try {
    const d = await api('/api/v1/system/logs');
    if (!d) { document.getElementById('log-container').textContent = '接口不可用'; return; }
    allLogs = Array.isArray(d) ? d : (d.logs||d.items||[]);
    filterLogs();
  } catch(e) { document.getElementById('log-container').textContent = '加载失败'; }
}

function filterLogs() {
  const level = document.getElementById('log-level-filter').value;
  const filtered = level ? allLogs.filter(l => (l.level||'').toUpperCase() === level) : allLogs;
  const container = document.getElementById('log-container');
  container.innerHTML = filtered.length ? filtered.map(l => {
    const lv = (l.level||'INFO').toUpperCase();
    const ts = l.timestamp || l.time || '';
    const msg = l.message || l.msg || JSON.stringify(l);
    return `<div><span class="log-${lv}" style="font-weight:600">[${lv}]</span> <span style="color:var(--text-muted)">${ts}</span> ${msg}</div>`;
  }).join('') : '<div style="color:var(--text-muted)">暂无日志</div>';
  container.scrollTop = container.scrollHeight;
}

// --- Settings ---
function saveSettings() {
  toast('功能开发中，敬请期待','info');
}

// --- Init ---
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
if (API_KEY) checkAuth(); else showLogin();
</script>
