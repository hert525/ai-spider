<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spider - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .btn-primary { background: #238636; color: #fff; border-radius: 6px; padding: 6px 16px; font-size: 14px; cursor: pointer; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 16px; font-size: 14px; cursor: pointer; }
        .btn-secondary:hover { background: #30363d; }
        .input-field { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; width: 100%; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 13px; color: #8b949e; margin-top: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .badge-green { background: #238636; color: #fff; }
        .badge-yellow { background: #9e6a03; color: #fff; }
        .badge-red { background: #da3633; color: #fff; }
        .badge-blue { background: #1f6feb; color: #fff; }
        .badge-gray { background: #30363d; color: #8b949e; }
        .table-row:hover { background: #1c2128; }
        .nav-item { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .nav-item:hover { background: #21262d; }
        .nav-active { background: #21262d; color: #58a6ff; }
        .log-line { font-family: monospace; font-size: 12px; line-height: 1.8; color: #8b949e; }
        .log-line:hover { color: #c9d1d9; background: #1c2128; }
    </style>
</head>
<body>
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-56 border-r border-gray-700 p-4 flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <span class="text-xl">🕷️</span>
                <h1 class="text-lg font-semibold text-white">管理后台</h1>
            </div>
            <nav class="space-y-1 flex-1">
                <div onclick="showSection('dashboard')" class="nav-item nav-active" id="nav-dashboard">📊 仪表盘</div>
                <div onclick="showSection('tasks')" class="nav-item" id="nav-tasks">📋 任务管理</div>
                <div onclick="showSection('workers')" class="nav-item" id="nav-workers">⚙️ Worker</div>
                <div onclick="showSection('logs')" class="nav-item" id="nav-logs">📝 系统日志</div>
                <div onclick="showSection('settings')" class="nav-item" id="nav-settings">🔧 设置</div>
            </nav>
            <a href="/" class="text-sm text-gray-500 hover:text-gray-300 mt-4">← 返回用户端</a>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-6 overflow-y-auto">
            <!-- Dashboard -->
            <section id="sec-dashboard">
                <h2 class="text-xl font-semibold text-white mb-4">仪表盘</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="stat-card"><div class="stat-number" id="s-projects">-</div><div class="stat-label">项目总数</div></div>
                    <div class="stat-card"><div class="stat-number" id="s-tasks">-</div><div class="stat-label">任务总数</div></div>
                    <div class="stat-card"><div class="stat-number" id="s-workers">-</div><div class="stat-label">在线Worker</div></div>
                    <div class="stat-card"><div class="stat-number" id="s-data">-</div><div class="stat-label">数据条数</div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="card p-4">
                        <h3 class="text-sm font-medium text-white mb-3">任务状态分布</h3>
                        <div id="task-status-chart" class="space-y-2"></div>
                    </div>
                    <div class="card p-4">
                        <h3 class="text-sm font-medium text-white mb-3">最近任务</h3>
                        <div id="recent-tasks" class="space-y-2 text-sm"></div>
                    </div>
                </div>
            </section>

            <!-- Tasks -->
            <section id="sec-tasks" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white">任务管理</h2>
                    <select id="task-filter" class="input-field" style="width:150px" onchange="loadAdminTasks()">
                        <option value="">全部状态</option>
                        <option value="queued">排队中</option>
                        <option value="running">运行中</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="cancelled">已取消</option>
                    </select>
                </div>
                <div class="card">
                    <table class="w-full text-sm">
                        <thead class="text-gray-400 border-b border-gray-700">
                            <tr><th class="p-3 text-left">任务</th><th class="p-3 text-left">类型</th><th class="p-3 text-left">状态</th><th class="p-3 text-left">Worker</th><th class="p-3 text-left">创建时间</th><th class="p-3 text-left">操作</th></tr>
                        </thead>
                        <tbody id="admin-task-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Workers -->
            <section id="sec-workers" class="hidden">
                <h2 class="text-xl font-semibold text-white mb-4">Worker 监控</h2>
                <div id="worker-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                <p id="no-workers" class="text-gray-500 text-center py-10 hidden">暂无注册的Worker</p>
            </section>

            <!-- Logs -->
            <section id="sec-logs" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white">系统日志</h2>
                    <button onclick="loadLogs()" class="btn-secondary text-sm">🔄 刷新</button>
                </div>
                <div class="card p-4 max-h-[70vh] overflow-y-auto" id="log-container"></div>
            </section>

            <!-- Settings -->
            <section id="sec-settings" class="hidden">
                <h2 class="text-xl font-semibold text-white mb-4">系统设置</h2>
                <div class="card p-4 space-y-3" id="settings-content"></div>
            </section>
        </main>
    </div>

    <script>
    const API = (path) => {
        const base = location.pathname.replace(/\/admin\/?$/, '');
        return `${base}${path}`.replace(/\/+/g, '/');
    };

    function statusBadge(s) {
        const m = { queued:['排队','badge-yellow'], running:['运行','badge-blue'], success:['成功','badge-green'], failed:['失败','badge-red'], cancelled:['取消','badge-gray'], paused:['暂停','badge-gray'] };
        const [t,c] = m[s] || [s,'badge-gray'];
        return `<span class="badge ${c}">${t}</span>`;
    }

    function showSection(name) {
        ['dashboard','tasks','workers','logs','settings'].forEach(s => {
            document.getElementById(`sec-${s}`).classList.toggle('hidden', s !== name);
            document.getElementById(`nav-${s}`).classList.toggle('nav-active', s === name);
        });
        if (name === 'dashboard') loadDashboard();
        if (name === 'tasks') loadAdminTasks();
        if (name === 'workers') loadWorkers();
        if (name === 'logs') loadLogs();
        if (name === 'settings') loadSettings();
    }

    async function loadDashboard() {
        try {
            const [stats, dash] = await Promise.all([
                fetch(API('/api/v1/system/stats')).then(r => r.json()),
                fetch(API('/admin/api/dashboard')).then(r => r.json()),
            ]);
            document.getElementById('s-projects').textContent = stats.projects || 0;
            document.getElementById('s-data').textContent = stats.data_records || 0;

            const ts = stats.tasks?.by_status || {};
            const total = Object.values(ts).reduce((a,b) => a+b, 0);
            document.getElementById('s-tasks').textContent = total;
            document.getElementById('s-workers').textContent = stats.workers?.online || 0;

            // Status chart
            const chart = document.getElementById('task-status-chart');
            chart.innerHTML = Object.entries(ts).map(([k,v]) => {
                const pct = total ? Math.round(v/total*100) : 0;
                return `<div class="flex items-center gap-2">
                    <span class="text-xs w-14 text-gray-400">${k}</span>
                    <div class="flex-1 h-4 bg-gray-800 rounded overflow-hidden">
                        <div class="h-full ${k==='success'?'bg-green-600':k==='failed'?'bg-red-600':k==='running'?'bg-blue-600':'bg-gray-600'}" style="width:${pct}%"></div>
                    </div>
                    <span class="text-xs text-gray-500 w-10 text-right">${v}</span>
                </div>`;
            }).join('');

            // Recent tasks
            const tasks = await fetch(API('/admin/api/tasks?limit=5')).then(r => r.json());
            document.getElementById('recent-tasks').innerHTML = tasks.slice(0,5).map(t =>
                `<div class="flex items-center justify-between py-1 border-b border-gray-800">
                    <span class="text-gray-300">${t.name || t.id}</span>
                    ${statusBadge(t.status)}
                </div>`
            ).join('') || '<p class="text-gray-500">暂无任务</p>';
        } catch (e) { console.error(e); }
    }

    async function loadAdminTasks() {
        const status = document.getElementById('task-filter').value;
        try {
            const tasks = await fetch(API(`/admin/api/tasks?status=${status}&limit=50`)).then(r => r.json());
            document.getElementById('admin-task-tbody').innerHTML = tasks.map(t => `
                <tr class="border-b border-gray-800 table-row">
                    <td class="p-3">${t.name || t.id}</td>
                    <td class="p-3"><span class="badge badge-gray">${t.task_type}</span></td>
                    <td class="p-3">${statusBadge(t.status)}</td>
                    <td class="p-3 text-gray-500">${t.worker_id || '-'}</td>
                    <td class="p-3 text-gray-500 text-xs">${t.created_at?.slice(0,16) || ''}</td>
                    <td class="p-3">
                        <div class="flex gap-1">
                            ${t.status==='failed'?`<button onclick="retryTask('${t.id}')" class="btn-secondary text-xs">🔄</button>`:''}
                            ${t.status==='running'?`<button onclick="pauseTask('${t.id}')" class="btn-secondary text-xs">⏸️</button>`:''}
                            ${t.status==='paused'?`<button onclick="resumeTask('${t.id}')" class="btn-secondary text-xs">▶</button>`:''}
                            <button onclick="deleteAdminTask('${t.id}')" class="text-gray-500 hover:text-red-400 text-xs">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="6" class="text-center py-8 text-gray-500">暂无任务</td></tr>';
        } catch (e) { console.error(e); }
    }

    async function retryTask(id) { await fetch(API(`/api/v1/tasks/${id}/retry`), {method:'POST'}); loadAdminTasks(); }
    async function pauseTask(id) { await fetch(API(`/api/v1/tasks/${id}/pause`), {method:'POST'}); loadAdminTasks(); }
    async function resumeTask(id) { await fetch(API(`/api/v1/tasks/${id}/retry`), {method:'POST'}); loadAdminTasks(); }
    async function deleteAdminTask(id) { if(confirm('确定？')) { await fetch(API(`/api/v1/tasks/${id}`), {method:'DELETE'}); loadAdminTasks(); } }

    async function loadWorkers() {
        try {
            const workers = await fetch(API('/admin/api/workers')).then(r => r.json());
            if (!workers.length) {
                document.getElementById('worker-cards').innerHTML = '';
                document.getElementById('no-workers').classList.remove('hidden');
                return;
            }
            document.getElementById('no-workers').classList.add('hidden');
            document.getElementById('worker-cards').innerHTML = workers.map(w => {
                const isOnline = w.status === 'online' || w.status === 'busy';
                return `<div class="card p-4">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-white font-medium">${w.id}</span>
                        <span class="badge ${isOnline ? 'badge-green' : 'badge-red'}">${w.status}</span>
                    </div>
                    <div class="text-xs text-gray-500 space-y-1">
                        <div>主机: ${w.hostname || '-'} (${w.ip || '-'})</div>
                        <div>CPU: ${w.cpu_percent}% | 内存: ${w.memory_mb}MB</div>
                        <div>活跃: ${w.active_jobs} | 完成: ${w.total_completed} | 失败: ${w.total_failed}</div>
                        <div>心跳: ${w.last_heartbeat?.slice(11,19) || '-'}</div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) { console.error(e); }
    }

    async function loadLogs() {
        try {
            const data = await fetch(API('/admin/api/logs?limit=200')).then(r => r.json());
            document.getElementById('log-container').innerHTML = (data.lines || []).map(l =>
                `<div class="log-line">${l}</div>`
            ).join('') || '<p class="text-gray-500">暂无日志</p>';
            const container = document.getElementById('log-container');
            container.scrollTop = container.scrollHeight;
        } catch (e) { console.error(e); }
    }

    async function loadSettings() {
        try {
            const s = await fetch(API('/api/v1/system/settings')).then(r => r.json());
            document.getElementById('settings-content').innerHTML = Object.entries(s).map(([k,v]) =>
                `<div class="flex items-center justify-between py-2 border-b border-gray-800">
                    <span class="text-gray-400 text-sm">${k}</span>
                    <span class="text-white text-sm font-mono">${v}</span>
                </div>`
            ).join('');
        } catch (e) { console.error(e); }
    }

    loadDashboard();
    </script>
</body>
</html>
