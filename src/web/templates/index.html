<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Spider</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-card:#16161f;
--bg-hover:#1c1c28;--bg-input:#0e0e16;--border:#262630;
--text-primary:#e8e8ed;--text-secondary:#8888a0;--text-muted:#55556a;
--accent:#6c5ce7;--accent-light:#7c6ff7;
--green:#00d68f;--red:#ff4757;--yellow:#ffa502;--blue:#3498ff;
}
body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{color:var(--accent-light)}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:14px;animation:slideIn .3s;max-width:360px;word-break:break-word}
.toast.success{background:var(--green);color:#000}
.toast.error{background:var(--red);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Layout */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.app-header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.app-header .logo i{color:var(--accent);font-size:24px}
.user-info{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text-secondary)}
.user-info button{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.user-info button:hover{border-color:var(--accent);color:var(--accent)}

/* Nav */
.nav-tabs{display:flex;background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0 24px;gap:4px;overflow-x:auto}
.nav-tab{padding:12px 20px;cursor:pointer;color:var(--text-secondary);font-size:14px;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.nav-tab:hover{color:var(--text-primary)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.container{max-width:1200px;margin:0 auto;padding:24px}

/* Auth */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px}
.auth-box h2{text-align:center;margin-bottom:8px;font-size:24px}
.auth-box .sub{text-align:center;color:var(--text-secondary);margin-bottom:28px;font-size:14px}

/* Form elements */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:var(--bg-hover);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:rgba(0,214,143,.15);color:var(--green)}
.badge-yellow{background:rgba(255,165,2,.15);color:var(--yellow)}
.badge-red{background:rgba(255,71,87,.15);color:var(--red)}
.badge-blue{background:rgba(52,152,255,.15);color:var(--blue)}
.badge-muted{background:rgba(85,85,106,.15);color:var(--text-muted)}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:.2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card h3{font-size:16px;margin-bottom:6px}
.card p{font-size:13px;color:var(--text-secondary);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text-secondary);font-weight:500;white-space:nowrap}
td{color:var(--text-primary)}
tr:hover td{background:var(--bg-hover)}

/* Detail tabs */
.detail-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.detail-tab{padding:10px 18px;cursor:pointer;color:var(--text-secondary);font-size:14px;border-bottom:2px solid transparent;transition:.2s}
.detail-tab:hover{color:var(--text-primary)}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.toolbar h2{font-size:20px}

/* Chat */
.chat-box{border:1px solid var(--border);border-radius:12px;height:300px;display:flex;flex-direction:column;overflow:hidden;margin-top:12px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:8px 12px;border-radius:8px;font-size:13px;max-width:80%;word-break:break-word}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end}
.chat-msg.ai{background:var(--bg-hover);align-self:flex-start}
.chat-input-row{display:flex;border-top:1px solid var(--border)}
.chat-input-row input{flex:1;padding:10px 14px;background:transparent;border:none;color:var(--text-primary);font-size:14px;outline:none}
.chat-input-row button{padding:10px 16px;background:var(--accent);color:#fff;border:none;cursor:pointer}

/* Slider */
input[type=range]{width:100%;accent-color:var(--accent)}

/* Responsive */
@media(max-width:640px){
  .container{padding:16px}
  .card-grid{grid-template-columns:1fr}
  .nav-tabs{padding:0 12px}
  .app-header{padding:12px 16px}
  .auth-box{padding:28px 20px}
}
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- AUTH PAGE -->
<div id="page-auth" class="auth-page">
  <div class="auth-box">
    <h2 id="auth-title">登录</h2>
    <p class="sub" id="auth-sub">登录你的 AI Spider 账户</p>
    <div id="auth-form">
      <div class="form-group hidden" id="fg-username">
        <label>用户名</label>
        <input class="form-input" id="auth-username" placeholder="你的用户名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input class="form-input" id="auth-email" type="email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input class="form-input" id="auth-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-block" id="auth-btn" onclick="doAuth()" style="margin-top:8px">登录</button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary)">
        <span id="auth-toggle-text">还没有账户？</span>
        <a id="auth-toggle-link" onclick="toggleAuthMode()">注册</a>
      </p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-main" class="hidden">
  <header class="app-header">
    <div class="logo"><i class="ri-spider-line"></i> AI Spider</div>
    <div class="user-info">
      <span id="display-username"></span>
      <button onclick="logout()"><i class="ri-logout-box-r-line"></i> 退出</button>
    </div>
  </header>
  <nav class="nav-tabs">
    <div class="nav-tab active" data-page="projects" onclick="switchPage('projects')"><i class="ri-folder-3-line"></i> 项目</div>
    <div class="nav-tab" data-page="tasks" onclick="switchPage('tasks')"><i class="ri-play-circle-line"></i> 任务</div>
    <div class="nav-tab" data-page="data" onclick="switchPage('data')"><i class="ri-database-2-line"></i> 数据</div>
  </nav>

  <!-- Projects Page -->
  <div id="page-projects" class="container">
    <div class="toolbar">
      <h2>我的项目</h2>
      <button class="btn btn-primary" onclick="showNewProjectModal()"><i class="ri-add-line"></i> 新建项目</button>
    </div>
    <div class="card-grid" id="project-list"></div>
  </div>

  <!-- Tasks Page -->
  <div id="page-tasks" class="container hidden">
    <div class="toolbar"><h2>任务列表</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>项目</th><th>状态</th><th>类型</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="task-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Data Page -->
  <div id="page-data" class="container hidden">
    <div class="toolbar">
      <h2>数据</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select class="form-input" id="data-project-filter" onchange="loadData()" style="width:auto;min-width:160px">
          <option value="">全部项目</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="exportData('json')"><i class="ri-download-line"></i> JSON</button>
        <button class="btn btn-secondary btn-sm" onclick="exportData('csv')"><i class="ri-download-line"></i> CSV</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="data-thead"><tr><th>加载中...</th></tr></thead>
        <tbody id="data-tbody"></tbody>
      </table>
    </div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:16px" id="data-pagination"></div>
  </div>

  <!-- Project Detail Page -->
  <div id="page-detail" class="container hidden">
    <div class="toolbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-secondary btn-sm" onclick="switchPage('projects')"><i class="ri-arrow-left-line"></i></button>
        <h2 id="detail-name"></h2>
        <span id="detail-badge"></span>
      </div>
    </div>
    <div class="detail-tabs">
      <div class="detail-tab active" data-tab="editor" onclick="switchDetailTab('editor')">编辑器</div>
      <div class="detail-tab" data-tab="test" onclick="switchDetailTab('test')">测试</div>
      <div class="detail-tab" data-tab="sink" onclick="switchDetailTab('sink')">Sink配置</div>
      <div class="detail-tab" data-tab="deploy" onclick="switchDetailTab('deploy')">部署</div>
    </div>

    <!-- Editor Tab -->
    <div id="tab-editor">
      <div id="editor-smart">
        <div class="form-group">
          <label>提取描述</label>
          <textarea class="form-input" id="editor-description" rows="4" placeholder="描述你要提取的数据..."></textarea>
        </div>
        <div class="form-group">
          <label>已提取数据</label>
          <pre style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;overflow:auto;max-height:300px;color:var(--text-secondary)" id="editor-extracted">暂无数据</pre>
        </div>
      </div>
      <div id="editor-code" class="hidden">
        <div class="form-group">
          <label>代码编辑器</label>
          <textarea class="form-input" id="editor-code-area" rows="12" style="font-family:monospace;font-size:13px" placeholder="# 爬虫代码..."></textarea>
        </div>
        <div class="form-group">
          <label>AI 对话 — 让 AI 帮你修改代码</label>
          <div class="chat-box">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-row">
              <input id="chat-input" placeholder="输入指令让AI修改代码..." onkeydown="if(event.key==='Enter')sendChat()">
              <button onclick="sendChat()"><i class="ri-send-plane-fill"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Test Tab -->
    <div id="tab-test" class="hidden">
      <div class="form-group">
        <label>目标 URL</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="test-url" placeholder="https://example.com" style="flex:1">
          <button class="btn btn-primary" id="test-run-btn" onclick="runTest()"><i class="ri-play-line"></i> 运行测试</button>
        </div>
      </div>
      <div id="test-result" style="margin-top:16px"></div>
    </div>

    <!-- Sink Tab -->
    <div id="tab-sink" class="hidden">
      <div class="form-group">
        <label>Sink 类型</label>
        <select class="form-input" id="sink-type" onchange="updateSinkFields()">
          <option value="sqlite">SQLite（默认）</option>
          <option value="local_file">本地文件</option>
          <option value="kafka">Kafka</option>
          <option value="s3">S3</option>
        </select>
      </div>
      <div id="sink-fields"></div>
      <button class="btn btn-primary" onclick="saveSink()" style="margin-top:12px"><i class="ri-save-line"></i> 保存配置</button>
    </div>

    <!-- Deploy Tab -->
    <div id="tab-deploy" class="hidden">
      <div class="form-group">
        <label>任务类型</label>
        <select class="form-input" id="deploy-type" onchange="document.getElementById('deploy-cron-group').classList.toggle('hidden',this.value!=='cron')">
          <option value="one_time">单次执行</option>
          <option value="cron">定时任务</option>
        </select>
      </div>
      <div class="form-group hidden" id="deploy-cron-group">
        <label>Cron 表达式</label>
        <input class="form-input" id="deploy-cron" placeholder="0 */6 * * *">
      </div>
      <div class="form-group">
        <label>目标 URL（每行一个）</label>
        <textarea class="form-input" id="deploy-urls" rows="4" placeholder="https://example.com/page1&#10;https://example.com/page2"></textarea>
      </div>
      <div class="form-group">
        <label>优先级: <span id="deploy-priority-val">5</span></label>
        <input type="range" min="1" max="10" value="5" id="deploy-priority" oninput="document.getElementById('deploy-priority-val').textContent=this.value">
      </div>
      <div style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>最大页数</label>
          <input class="form-input" id="deploy-maxpages" type="number" value="100" min="1">
        </div>
        <div class="form-group" style="flex:1">
          <label>超时（秒）</label>
          <input class="form-input" id="deploy-timeout" type="number" value="300" min="10">
        </div>
      </div>
      <button class="btn btn-primary" onclick="deployTask()"><i class="ri-rocket-line"></i> 部署</button>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div id="modal-new-project" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h3>新建项目</h3>
    <div class="form-group"><label>项目名称</label><input class="form-input" id="np-name" placeholder="我的爬虫项目"></div>
    <div class="form-group"><label>描述</label><textarea class="form-input" id="np-desc" rows="2" placeholder="项目描述..."></textarea></div>
    <div class="form-group"><label>目标 URL</label><input class="form-input" id="np-url" placeholder="https://example.com"></div>
    <div class="form-group">
      <label>模式</label>
      <select class="form-input" id="np-mode">
        <option value="smart_scraper">智能提取</option>
        <option value="code_generator">代码生成</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('modal-new-project').classList.add('hidden')">取消</button>
      <button class="btn btn-primary" onclick="createProject()">创建</button>
    </div>
  </div>
</div>

<script>
// API Base
const pathParts = location.pathname.split('/');
const spiderIdx = pathParts.indexOf('spider');
const API_BASE = spiderIdx >= 0 ? pathParts.slice(0, spiderIdx + 1).join('/') : '';

let isRegister = false;
let currentProject = null;
let allData = [];

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function api(method, path, body) {
  const key = localStorage.getItem('api_key');
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (key) opts.headers['X-API-Key'] = key;
  if (body) opts.body = JSON.stringify(body);
  return fetch(API_BASE + path, opts).then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.detail || data.error || r.statusText);
    return data;
  });
}

// Auth
function toggleAuthMode() {
  isRegister = !isRegister;
  document.getElementById('auth-title').textContent = isRegister ? '注册' : '登录';
  document.getElementById('auth-sub').textContent = isRegister ? '创建新的 AI Spider 账户' : '登录你的 AI Spider 账户';
  document.getElementById('auth-btn').textContent = isRegister ? '注册' : '登录';
  document.getElementById('fg-username').classList.toggle('hidden', !isRegister);
  document.getElementById('auth-toggle-text').textContent = isRegister ? '已有账户？' : '还没有账户？';
  document.getElementById('auth-toggle-link').textContent = isRegister ? '登录' : '注册';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) return toast('请填写所有字段', 'error');
  try {
    if (isRegister) {
      const username = document.getElementById('auth-username').value.trim();
      if (!username) return toast('请填写用户名', 'error');
      const res = await api('POST', '/api/v1/auth/register', { email, username, password });
      localStorage.setItem('api_key', res.api_key);
      localStorage.setItem('username', res.user?.username || username);
      toast('注册成功');
    } else {
      const res = await api('POST', '/api/v1/auth/login', { email, password });
      localStorage.setItem('api_key', res.api_key);
      localStorage.setItem('username', res.user?.username || email.split('@')[0]);
      toast('登录成功');
    }
    enterApp();
  } catch (e) { toast(e.message, 'error'); }
}

function logout() {
  localStorage.removeItem('api_key');
  localStorage.removeItem('username');
  document.getElementById('app-main').classList.add('hidden');
  document.getElementById('page-auth').classList.remove('hidden');
}

function enterApp() {
  document.getElementById('page-auth').classList.add('hidden');
  document.getElementById('app-main').classList.remove('hidden');
  document.getElementById('display-username').textContent = localStorage.getItem('username') || '';
  connectWS();
  switchPage('projects');
}

// WebSocket
let _ws = null;
function connectWS() {
  if (_ws) { try { _ws.close(); } catch(e){} }
  const apiKey = localStorage.getItem('api_key');
  if (!apiKey) return;
  const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsPath = API_BASE + '/ws/' + apiKey;
  const wsUrl = wsProtocol + '//' + location.host + wsPath;
  _ws = new WebSocket(wsUrl);
  _ws.onopen = () => { console.log('WS connected'); };
  _ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleWSMessage(msg);
    } catch(err) { console.warn('WS parse error', err); }
  };
  _ws.onclose = () => {
    console.log('WS disconnected, reconnecting in 5s...');
    setTimeout(connectWS, 5000);
  };
  _ws.onerror = (e) => { console.warn('WS error', e); };
  // Keepalive ping every 30s
  setInterval(() => {
    if (_ws && _ws.readyState === WebSocket.OPEN) {
      _ws.send(JSON.stringify({type: 'ping'}));
    }
  }, 30000);
}

function handleWSMessage(msg) {
  switch(msg.type) {
    case 'task_update':
      toast('任务 ' + (msg.task_id||'').slice(0,8) + ' ' + (msg.status === 'success' ? '完成' : '失败'), msg.status === 'success' ? 'success' : 'error');
      if (document.getElementById('page-tasks') && !document.getElementById('page-tasks').classList.contains('hidden')) loadTasks();
      break;
    case 'test_complete':
      toast('测试' + (msg.status === 'success' ? '成功' : '失败'), msg.status === 'success' ? 'success' : 'error');
      break;
    case 'project_created':
      if (document.getElementById('page-projects') && !document.getElementById('page-projects').classList.contains('hidden')) loadProjects();
      break;
    case 'pong':
      break;
    default:
      console.log('WS message:', msg);
  }
}

// Navigation
function switchPage(page) {
  ['projects','tasks','data','detail'].forEach(p => document.getElementById('page-'+p).classList.add('hidden'));
  document.getElementById('page-'+page).classList.remove('hidden');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page===page));
  if (page==='projects') loadProjects();
  if (page==='tasks') loadTasks();
  if (page==='data') { loadProjectFilter(); loadData(); }
}

function statusBadge(status) {
  const map = {active:'badge-green',running:'badge-blue',pending:'badge-yellow',failed:'badge-red',completed:'badge-green',cancelled:'badge-muted',draft:'badge-muted',generating:'badge-yellow',generated:'badge-green',testing:'badge-blue',tested:'badge-green',approved:'badge-green',queued:'badge-yellow',success:'badge-green',paused:'badge-muted'};
  return `<span class="badge ${map[status]||'badge-muted'}">${status||'unknown'}</span>`;
}

function modeLabel(m) { return m==='smart_scraper'?'智能提取':'代码生成'; }
function shortId(id) { return id ? String(id).slice(0,8) : '-'; }
function fmtTime(t) { if(!t)return'-'; try{return new Date(t).toLocaleString('zh-CN')}catch{return t} }

// Projects
async function loadProjects() {
  try {
    const res = await api('GET', '/api/v1/projects');
    const list = Array.isArray(res) ? res : (res.projects || []);
    const el = document.getElementById('project-list');
    if (!list.length) { el.innerHTML = '<p style="color:var(--text-muted)">暂无项目，点击"新建项目"开始</p>'; return; }
    el.innerHTML = list.map(p => `
      <div class="card" onclick="openProject('${p.id}')">
        <h3>${esc(p.name)}</h3>
        <p>${esc(p.description||'无描述')}</p>
        <div class="meta">
          <span class="badge badge-blue">${modeLabel(p.mode)}</span>
          ${statusBadge(p.status)}
          <span>${fmtTime(p.created_at)}</span>
        </div>
      </div>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

function showNewProjectModal() { document.getElementById('modal-new-project').classList.remove('hidden'); }

async function createProject() {
  const name = document.getElementById('np-name').value.trim();
  const description = document.getElementById('np-desc').value.trim();
  const target_url = document.getElementById('np-url').value.trim();
  const mode = document.getElementById('np-mode').value;
  if (!name) return toast('请填写项目名称','error');
  try {
    await api('POST', '/api/v1/projects', { name, description, target_url, mode });
    document.getElementById('modal-new-project').classList.add('hidden');
    toast('项目创建成功');
    loadProjects();
  } catch(e) { toast(e.message,'error'); }
}

async function openProject(id) {
  try {
    const p = await api('GET', `/api/v1/projects/${id}`);
    currentProject = p;
    document.getElementById('detail-name').textContent = currentProject.name;
    document.getElementById('detail-badge').innerHTML = statusBadge(currentProject.status);
    // editor mode
    const isSmart = currentProject.mode === 'smart_scraper';
    document.getElementById('editor-smart').classList.toggle('hidden', !isSmart);
    document.getElementById('editor-code').classList.toggle('hidden', isSmart);
    if (isSmart) {
      document.getElementById('editor-description').value = currentProject.extraction_description || currentProject.description || '';
      let extracted = currentProject.extracted_data || '';
      if (typeof extracted === 'string') { try { extracted = JSON.parse(extracted); } catch(e) {} }
      document.getElementById('editor-extracted').textContent = extracted ? JSON.stringify(extracted, null, 2) : '暂无数据';
    } else {
      document.getElementById('editor-code-area').value = currentProject.code || '';
      // Load chat history
      let msgs = currentProject.messages || [];
      if (typeof msgs === 'string') { try { msgs = JSON.parse(msgs); } catch(e) { msgs = []; } }
      const box = document.getElementById('chat-messages');
      box.innerHTML = msgs.map(m => `<div class="chat-msg ${m.role==='user'?'user':'ai'}">${esc(m.content)}</div>`).join('');
      box.scrollTop = box.scrollHeight;
    }
    document.getElementById('test-url').value = currentProject.target_url || '';
    // sink
    const sinkCfg = currentProject.sink_config || {};
    if (typeof sinkCfg === 'string') { try { currentProject.sink_config = JSON.parse(sinkCfg); } catch(e) { currentProject.sink_config = {}; } }
    if (currentProject.sink_config && currentProject.sink_config.sink_type) {
      document.getElementById('sink-type').value = currentProject.sink_config.sink_type;
    }
    updateSinkFields();
    switchDetailTab('editor');
    switchPage('detail');
  } catch(e) { toast(e.message,'error'); }
}

function switchDetailTab(tab) {
  ['editor','test','sink','deploy'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab));
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
}

// Chat
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !currentProject) return;
  input.value = '';
  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div class="chat-msg user">${esc(msg)}</div>`;
  box.scrollTop = box.scrollHeight;
  try {
    const res = await api('POST', `/api/v1/projects/${currentProject.id}/refine`, { feedback: msg });
    // Backend returns updated project object; extract last assistant message
    let reply = '';
    try {
      const msgs = typeof res.messages === 'string' ? JSON.parse(res.messages) : (res.messages || []);
      const lastAi = msgs.filter(m=>m.role==='assistant').pop();
      reply = lastAi ? lastAi.content : JSON.stringify(res);
    } catch(e) { reply = JSON.stringify(res); }
    box.innerHTML += `<div class="chat-msg ai">${esc(reply)}</div>`;
    if (res.code) document.getElementById('editor-code-area').value = res.code;
    currentProject = res;
  } catch(e) {
    box.innerHTML += `<div class="chat-msg ai" style="color:var(--red)">错误: ${esc(e.message)}</div>`;
  }
  box.scrollTop = box.scrollHeight;
}

// Test
async function runTest() {
  const url = document.getElementById('test-url').value.trim();
  if (!url || !currentProject) return toast('请输入目标URL','error');
  const btn = document.getElementById('test-run-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ri-loader-4-line"></i> 运行中...';
  const start = Date.now();
  try {
    const res = await api('POST', `/api/v1/projects/${currentProject.id}/test`, { target_url: url });
    const elapsed = ((Date.now()-start)/1000).toFixed(1);
    const data = res.output || res.data || res.result || res;
    const error = res.error;
    let html = '';
    if (error) {
      html = `<p style="color:var(--red);margin-bottom:8px">✗ 测试失败 (${elapsed}s)</p><pre style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;overflow:auto;max-height:300px;color:var(--red)">${esc(error)}</pre>`;
    } else {
      html = `<p style="color:var(--green);margin-bottom:8px">✓ 测试完成 (${elapsed}s)</p>`;
    if (Array.isArray(data) && data.length) {
      const keys = Object.keys(data[0]);
      html += `<div class="table-wrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>`;
      data.forEach(row => { html += '<tr>' + keys.map(k=>`<td>${esc(String(row[k]??''))}</td>`).join('') + '</tr>'; });
      html += '</tbody></table></div>';
    } else {
      html += `<pre style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;overflow:auto;max-height:300px">${esc(JSON.stringify(data,null,2))}</pre>`;
    }
    }
    document.getElementById('test-result').innerHTML = html;
  } catch(e) {
    document.getElementById('test-result').innerHTML = `<p style="color:var(--red)">✗ ${esc(e.message)}</p>`;
  }
  btn.disabled = false; btn.innerHTML = '<i class="ri-play-line"></i> 运行测试';
}

// Sink
function updateSinkFields() {
  const type = document.getElementById('sink-type').value;
  const sink = currentProject?.sink_config || {};
  let html = '';
  if (type === 'local_file') {
    html = `
      <div class="form-group"><label>输出目录</label><input class="form-input" id="sink-dir" value="${esc(sink.output_dir||'')}" placeholder="/data/output"></div>
      <div class="form-group"><label>格式</label><select class="form-input" id="sink-format">
        <option value="jsonl" ${sink.format==='jsonl'?'selected':''}>JSONL</option>
        <option value="csv" ${sink.format==='csv'?'selected':''}>CSV</option>
        <option value="json" ${sink.format==='json'?'selected':''}>JSON</option>
      </select></div>`;
  } else if (type === 'kafka') {
    html = `
      <div class="form-group"><label>Bootstrap Servers</label><input class="form-input" id="sink-kafka-servers" value="${esc(sink.bootstrap_servers||'')}" placeholder="localhost:9092"></div>
      <div class="form-group"><label>Topic</label><input class="form-input" id="sink-kafka-topic" value="${esc(sink.topic||'')}" placeholder="spider-data"></div>
      <div class="form-group"><label>Key Field（可选）</label><input class="form-input" id="sink-kafka-key" value="${esc(sink.key_field||'')}" placeholder="id"></div>`;
  } else if (type === 's3') {
    html = `
      <div class="form-group"><label>Bucket</label><input class="form-input" id="sink-s3-bucket" value="${esc(sink.bucket||'')}"></div>
      <div class="form-group"><label>Prefix</label><input class="form-input" id="sink-s3-prefix" value="${esc(sink.prefix||'')}"></div>
      <div class="form-group"><label>Region</label><input class="form-input" id="sink-s3-region" value="${esc(sink.region||'')}" placeholder="us-east-1"></div>
      <div class="form-group"><label>Access Key</label><input class="form-input" id="sink-s3-ak" value="${esc(sink.access_key||'')}"></div>
      <div class="form-group"><label>Secret Key</label><input class="form-input" id="sink-s3-sk" type="password" value="${esc(sink.secret_key||'')}"></div>
      <div class="form-group"><label>格式</label><select class="form-input" id="sink-s3-format">
        <option value="jsonl" ${sink.format==='jsonl'?'selected':''}>JSONL</option>
        <option value="csv" ${sink.format==='csv'?'selected':''}>CSV</option>
        <option value="json" ${sink.format==='json'?'selected':''}>JSON</option>
      </select></div>`;
  }
  document.getElementById('sink-fields').innerHTML = html;
}

async function saveSink() {
  if (!currentProject) return;
  const sink_type = document.getElementById('sink-type').value;
  const sink_config = { sink_type };
  if (sink_type === 'local_file') {
    sink_config.output_dir = document.getElementById('sink-dir').value;
    sink_config.format = document.getElementById('sink-format').value;
  } else if (sink_type === 'kafka') {
    sink_config.bootstrap_servers = document.getElementById('sink-kafka-servers').value;
    sink_config.topic = document.getElementById('sink-kafka-topic').value;
    sink_config.key_field = document.getElementById('sink-kafka-key').value || undefined;
  } else if (sink_type === 's3') {
    sink_config.bucket = document.getElementById('sink-s3-bucket').value;
    sink_config.prefix = document.getElementById('sink-s3-prefix').value;
    sink_config.region = document.getElementById('sink-s3-region').value;
    sink_config.access_key = document.getElementById('sink-s3-ak').value;
    sink_config.secret_key = document.getElementById('sink-s3-sk').value;
    sink_config.format = document.getElementById('sink-s3-format').value;
  }
  try {
    await api('PUT', `/api/v1/projects/${currentProject.id}/sink`, { sink_config });
    toast('Sink 配置已保存');
  } catch(e) { toast(e.message,'error'); }
}

// Deploy
async function deployTask() {
  if (!currentProject) return;
  const urlText = document.getElementById('deploy-urls').value.trim();
  const target_urls = urlText ? urlText.split('\n').map(u=>u.trim()).filter(Boolean) : [];
  if (!target_urls.length) return toast('请输入至少一个目标URL','error');
  const task_type = document.getElementById('deploy-type').value;
  const body = {
    project_id: currentProject.id,
    task_type,
    target_urls,
    priority: parseInt(document.getElementById('deploy-priority').value),
    max_pages: parseInt(document.getElementById('deploy-maxpages').value),
    timeout_seconds: parseInt(document.getElementById('deploy-timeout').value)
  };
  if (task_type === 'cron') body.cron_expr = document.getElementById('deploy-cron').value;
  try {
    await api('POST', '/api/v1/tasks', body);
    toast('任务已部署');
  } catch(e) { toast(e.message,'error'); }
}

// Tasks
async function loadTasks() {
  try {
    const res = await api('GET', '/api/v1/tasks');
    const list = Array.isArray(res) ? res : (res.tasks || []);
    document.getElementById('task-tbody').innerHTML = list.length ? list.map(t => `<tr>
      <td>${shortId(t.id)}</td><td>${esc(t.project_name||t.project_id||'-')}</td>
      <td>${statusBadge(t.status)}</td><td>${t.task_type||t.type||'-'}</td>
      <td>${fmtTime(t.created_at)}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${t.status==='running'||t.status==='pending'?`<button class="btn btn-secondary btn-sm" onclick="taskAction('${t.id}','cancel')">取消</button>`:''}
        ${t.status==='failed'?`<button class="btn btn-secondary btn-sm" onclick="taskAction('${t.id}','retry')">重试</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="taskAction('${t.id}','delete')">删除</button>
      </td></tr>`).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">暂无任务</td></tr>';
  } catch(e) { toast(e.message,'error'); }
}

async function taskAction(id, action) {
  try {
    if (action==='delete') await api('DELETE', `/api/v1/tasks/${id}`);
    else await api('POST', `/api/v1/tasks/${id}/${action}`);
    toast('操作成功'); loadTasks();
  } catch(e) { toast(e.message,'error'); }
}

// Data
async function loadProjectFilter() {
  try {
    const res = await api('GET', '/api/v1/projects');
    const list = Array.isArray(res) ? res : (res.projects || []);
    const sel = document.getElementById('data-project-filter');
    sel.innerHTML = '<option value="">全部项目</option>' + list.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
  } catch(e) {}
}

let dataPage = 1;
async function loadData(page) {
  dataPage = page || 1;
  const pid = document.getElementById('data-project-filter').value;
  let url = `/api/v1/data?page=${dataPage}&page_size=20`;
  if (pid) url += `&project_id=${pid}`;
  try {
    const res = await api('GET', url);
    allData = Array.isArray(res) ? res : (res.data || res.items || []);
    const total = res.total || allData.length;
    if (!allData.length) {
      document.getElementById('data-thead').innerHTML = '<tr><th>暂无数据</th></tr>';
      document.getElementById('data-tbody').innerHTML = '';
      document.getElementById('data-pagination').innerHTML = '';
      return;
    }
    const keys = Object.keys(allData[0]);
    document.getElementById('data-thead').innerHTML = '<tr>' + keys.map(k=>`<th>${esc(k)}</th>`).join('') + '</tr>';
    document.getElementById('data-tbody').innerHTML = allData.map(row => '<tr>' + keys.map(k=>`<td>${esc(String(row[k]??''))}</td>`).join('') + '</tr>').join('');
    const pages = Math.ceil(total/20);
    let pgHtml = '';
    for (let i=1;i<=pages&&i<=10;i++) pgHtml += `<button class="btn btn-sm ${i===dataPage?'btn-primary':'btn-secondary'}" onclick="loadData(${i})">${i}</button>`;
    document.getElementById('data-pagination').innerHTML = pgHtml;
  } catch(e) { toast(e.message,'error'); }
}

function exportData(fmt) {
  const pid = document.getElementById('data-project-filter').value;
  let url = API_BASE + `/api/v1/data/export?format=${fmt}`;
  if (pid) url += `&project_id=${pid}`;
  window.open(url, '_blank');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Init
if (localStorage.getItem('api_key')) enterApp();
</script>
